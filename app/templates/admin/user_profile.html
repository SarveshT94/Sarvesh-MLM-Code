<h2>User Profile</h2>

<table border="1" cellpadding="10">

<tr>
<td>ID</td>
<td>{{ user.id }}</td>
</tr>

<tr>
<td>Name</td>
<td>{{ user.full_name }}</td>
</tr>

<tr>
<td>Email</td>
<td>{{ user.email }}</td>
</tr>

<tr>
<td>Phone</td>
<td>{{ user.phone }}</td>
</tr>

<tr>
<td>Status</td>
<td>
{% if user.is_active %}
Active
{% else %}
Inactive
{% endif %}
</td>
</tr>

</table>
