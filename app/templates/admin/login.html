<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Secure Login - RK Trendz</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0f172a; min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Inter', sans-serif; }
        .login-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); width: 100%; max-width: 450px; }
        .form-control { padding: 12px 15px; border-radius: 10px; border: 1px solid #e2e8f0; }
        .form-control:focus { box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2); border-color: #10b981; }
        .btn-primary { background-color: #10b981; border: none; padding: 12px; border-radius: 10px; font-weight: bold; font-size: 16px; transition: all 0.3s; }
        .btn-primary:hover { background-color: #059669; transform: translateY(-2px); }
        .input-group-text { cursor: pointer; border-radius: 0 10px 10px 0; background: transparent; border-left: none; }
        .password-input { border-right: none; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="text-center mb-4">
            <h2 class="fw-black text-dark mb-0">RK <span style="color: #10b981;">Trendz</span></h2>
            <p class="text-muted small fw-bold text-uppercase tracking-widest mt-1">Admin Secure Portal</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ 'success' if category == 'success' else 'danger' }} text-center text-sm p-2 rounded-3 mb-4">
                        <i class="fas fa-exclamation-circle me-1"></i> {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="/admin/login" method="POST">
            <div class="mb-4">
                <label class="form-label text-secondary fw-bold small mb-1">Admin Email or ID</label>
                <div class="input-group">
                    <span class="input-group-text bg-light text-muted border-end-0 rounded-start-3"><i class="fas fa-user"></i></span>
                    <input type="text" name="identifier" class="form-control border-start-0 ps-0" placeholder="admin@rktrendz.com" required>
                </div>
            </div>

            <div class="mb-4">
                <div class="d-flex justify-content-between align-items-center mb-1">
                    <label class="form-label text-secondary fw-bold small mb-0">Password</label>
                    <a href="/admin/forgot-password" class="text-decoration-none small fw-bold" style="color: #10b981;">Forgot Password?</a>
                </div>
                <div class="input-group">
                    <span class="input-group-text bg-light text-muted border-end-0 rounded-start-3"><i class="fas fa-lock"></i></span>
                    <input type="password" name="password" id="passwordField" class="form-control border-start-0 border-end-0 ps-0 password-input" placeholder="••••••••" required>
                    <span class="input-group-text border-start-0" onclick="togglePassword()">
                        <i class="fas fa-eye text-muted" id="eyeIcon"></i>
                    </span>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 shadow-sm mt-2">
                <i class="fas fa-sign-in-alt me-2"></i> Access Dashboard
            </button>
        </form>
    </div>

    <script>
        function togglePassword() {
            var x = document.getElementById("passwordField");
            var icon = document.getElementById("eyeIcon");
            if (x.type === "password") {
                x.type = "text";
                icon.classList.remove("fa-eye");
                icon.classList.add("fa-eye-slash", "text-success");
            } else {
                x.type = "password";
                icon.classList.remove("fa-eye-slash", "text-success");
                icon.classList.add("fa-eye");
            }
        }
    </script>
</body>
</html>
